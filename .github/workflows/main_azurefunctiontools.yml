# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure Functions: https://aka.ms/python-webapps-actions

name: Build and deploy Python project to Azure Function App - AzureFunctionTools

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.13'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python version
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies into Azure Functions package folder
        run: |
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Generate version metadata document
        run: |
          python scripts/generate_version_metadata.py
          cat version-metadata.txt

      - name: Verify package contents
        run: |
          echo "=== root ==="
          ls -la
          echo "=== python packages ==="
          ls -la .python_packages/lib/site-packages | head -200
          python - <<'PY'
          import os
          print("cryptography dir exists:", os.path.isdir(".python_packages/lib/site-packages/cryptography"))
          print("pyjks dir exists:", os.path.isdir(".python_packages/lib/site-packages/jks"))
          print("requirements exists:", os.path.isfile("requirements.txt"))
          print("host.json exists:", os.path.isfile("host.json"))
          PY

      - name: Create deployment package
        run: |
          mkdir -p package
          rsync -av \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "venv" \
            --exclude ".venv" \
            --exclude "__pycache__" \
            --exclude ".pytest_cache" \
            --exclude "tests" \
            ./ package/
          cd package
          zip -r ../release.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact
        run: |
          unzip -o release.zip -d packaged
          echo "=== packaged root ==="
          ls -la packaged
          echo "=== packaged python packages ==="
          ls -la packaged/.python_packages/lib/site-packages | head -200

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DD663C0893C44C2A90E26844C52FB9B9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_03AF55F6E8114F47A857F986B2C9B9E6 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_FBF150FF33574849A57D53619731F9BF }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: AzureFunctionTools
          slot-name: Production
          package: packaged
